name: marviz_ai
description: "MARVIZ AI - Motorcycle AI Safety and Smart Riding Ecosystem"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # State Management - Riverpod 2.x
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Networking (we'll use this later for non-Firebase APIs)
  dio: ^5.7.0

  # Utilities
  intl: ^0.20.0
  logger: ^2.4.0

  # Form validation
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.0.0

  # Connectivity check
  connectivity_plus: ^6.0.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Riverpod code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/